<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .profile-container {
            max-width: 400px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px 24px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 2px solid #eee;
        }
        h2 {
            margin: 12px 0 8px 0;
            font-size: 1.5em;
        }
        .bio {
            color: #666;
            font-size: 1em;
            margin-bottom: 20px;
        }
        .profile-info {
            text-align: left;
            margin-top: 20px;
        }
        .profile-info dt {
            font-weight: bold;
            color: #333;
        }
        .profile-info dd {
            margin: 0 0 12px 0;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <img class="avatar" src="https://via.placeholder.com/100" alt="User Avatar">
        <h2>Jane Doe</h2>
        <div class="bio">Web developer. Passionate about open source and UI design.</div>
        <dl class="profile-info">
            <dt>Email:</dt>
            <dd>jane.doe@example.com</dd>
            <dt>Location:</dt>
            <dd>San Francisco, CA</dd>
            <dt>Joined:</dt>
            <dd>January 2023</dd>
        </dl>
    </div>
</body>
</html>

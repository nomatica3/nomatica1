<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Images Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .gallery img {
            max-width: 220px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: #fff;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h1>Images Gallery</h1>
    <div class="gallery">
        <img src="https://via.placeholder.com/220x150?text=Image+1" alt="Image 1">
        <img src="https://via.placeholder.com/220x150?text=Image+2" alt="Image 2">
        <img src="https://via.placeholder.com/220x150?text=Image+3" alt="Image 3">
        <img src="https://via.placeholder.com/220x150?text=Image+4" alt="Image 4">
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Videos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            background: #f9f9f9;
            color: #222;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        .video-list {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }
        .video-item {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            padding: 1rem;
            width: 320px;
            box-sizing: border-box;
            text-align: center;
        }
        .video-item video {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .video-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Video Gallery</h1>
    <div class="video-list">
        <div class="video-item">
            <video controls>
                <source src="sample1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-title">Sample Video 1</div>
            <div class="video-desc">Description for video 1.</div>
        </div>
        <div class="video-item">
            <video controls>
                <source src="sample2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="video-title">Sample Video 2</div>
            <div class="video-desc">Description for video 2.</div>
        </div>
        <!-- Add more video items as needed -->
    </div>
</body>
</html>
